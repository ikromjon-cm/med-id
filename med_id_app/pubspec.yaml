name: med_id_app
description: "MED-ID Biometric Medical Platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.11.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.8.0
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.4
  local_auth: ^2.3.0
  shimmer: ^3.0.0
  fl_chart: ^0.70.2
  mobile_scanner: ^6.0.2
  qr_flutter: ^4.1.0
  intl: ^0.19.0
  image_picker: ^1.1.2
  share_plus: ^10.1.4
  animate_do: ^5.1.0
  google_fonts: ^6.2.1
  firebase_core: ^3.12.1
  firebase_messaging: ^15.2.4
  flutter_local_notifications: ^18.0.1
  equatable: ^2.0.7
  dartz: ^0.10.1
  connectivity_plus: ^6.1.5
  skeletonizer: ^1.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3
  mockito: ^5.4.5
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/
    - assets/icons/
